<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Leaderboard</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: radial-gradient(circle at top, #1a1a2e, #0f0f1a);
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
        }

        h1 {
            margin-top: 40px;
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-shadow: 0 0 15px #00ffe1, 0 0 30px #00ffe1;
        }

        ol#leaderboard-list {
            margin-top: 30px;
            padding: 20px 40px;
            width: 320px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            box-shadow: 0 0 25px rgba(0, 255, 225, 0.15);
        }

        ol#leaderboard-list li {
            margin: 12px 0;
            padding: 10px 15px;
            border-radius: 10px;
            background: linear-gradient(90deg, rgba(0, 255, 225, 0.1), rgba(255, 255, 255, 0.05));
            border-left: 4px solid #00ffe1;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        ol#leaderboard-list li:hover {
            transform: translateX(5px);
            box-shadow: 0 0 15px rgba(0, 255, 225, 0.4);
        }

        button {
            margin-top: 25px;
            padding: 12px 25px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            color: #0f0f1a;
            background: linear-gradient(90deg, #00ffe1, #00b3ff);
            box-shadow: 0 0 20px rgba(0, 255, 225, 0.3);
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 225, 0.6);
        }
    </style>
</head>

<body>

    <h1>🏆 Leaderboard</h1>

    <ol id="leaderboard-list"></ol>

    <button onclick="clearBoard()">Clear Leaderboard</button>
    <button type="reset" onclick="window.location.href='index.html'">HOME</button>

    <script src="leaderboard.js"></script>

</body>

</html>
